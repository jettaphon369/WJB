<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#315b2d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">
  <title>Orchardia Online Engine V1.5 — Visual & Combat Polish</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="top-row">
      <div class="panel quest">
        <b>เควสต์:</b> <span id="questText">กำจัดตั๊กแตน <span id="questCount">0</span>/5</span>
      </div>
      <div class="panel wallet">🪙 <span id="coins">0</span> · 🎒 <span id="items">0</span> <button id="bagBtn" class="mini-btn">กระเป๋า</button></div>
    </div>

    <div class="status-wrap">
      <div id="status">Lv.1 Seed Ranger</div>
      <div class="bar"><div id="hpFill" class="fill hp"></div></div>
      <div class="bar"><div id="mpFill" class="fill mp"></div></div>
      <div class="bar"><div id="xpFill" class="fill xp"></div></div>
    </div>

    <div id="message"></div>
    <div id="target" class="panel">เป้าหมาย: ไม่มี</div>
    <div id="hint" class="panel">ลากพื้นที่ว่างเพื่อหมุนกล้อง</div>

    <div id="joystick">
      <div id="stick"></div>
    </div>

    <div class="actions">
      <button id="attackBtn" class="action primary">โจมตี</button>
      <button id="skillBtn" class="action">สกิล 1</button>
      <button id="skill2Btn" class="action">สกิล 2</button>
      <button id="rollBtn" class="action">กลิ้ง</button>
      <button id="lockBtn" class="action">ล็อก</button>
      <button id="interactBtn" class="action interact">คุย</button>
    </div>
  </div>

  <div id="inventoryPanel" class="window hidden">
    <div class="window-head">
      <b>กระเป๋านักผจญภัย</b>
      <button id="closeInventoryBtn">✕</button>
    </div>
    <div class="stats-grid">
      <div>พลังโจมตี <b id="attackStat">22</b></div>
      <div>HP สูงสุด <b id="maxHpStat">100</b></div>
      <div>ยา HP <b id="potionCount">0</b></div>
      <div>เมล็ดหายาก <b id="seedCount">0</b></div>
    </div>
    <div class="inventory-actions">
      <button id="usePotionBtn">ใช้ยา HP</button>
      <button id="upgradeWeaponBtn">อัปเกรดธนู 80 🪙</button>
    </div>
  </div>

  <div id="dialoguePanel" class="window dialogue hidden">
    <div class="window-head">
      <b id="dialogueName">ผู้ดูแลสวน</b>
      <button id="closeDialogueBtn">✕</button>
    </div>
    <p id="dialogueText"></p>
    <div id="dialogueActions" class="inventory-actions"></div>
  </div>

  <div id="errorBox"></div>
  <script src="game.js"></script>
</body>
</html>
