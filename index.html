<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#315b2d">
  <title>Orchardia Online Engine V1 — Flat GitHub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="top-row">
      <div class="panel quest">
        <b>เควสต์:</b> กำจัดตั๊กแตน <span id="questCount">0</span>/5
      </div>
      <div class="panel wallet">🪙 <span id="coins">0</span> · 🎒 <span id="items">0</span></div>
    </div>

    <div class="status-wrap">
      <div id="status">Lv.1 Seed Ranger</div>
      <div class="bar"><div id="hpFill" class="fill hp"></div></div>
      <div class="bar"><div id="mpFill" class="fill mp"></div></div>
      <div class="bar"><div id="xpFill" class="fill xp"></div></div>
    </div>

    <div id="message"></div>
    <div id="target" class="panel">เป้าหมาย: ไม่มี</div>

    <div id="joystick">
      <div id="stick"></div>
    </div>

    <div class="actions">
      <button id="attackBtn" class="action primary">โจมตี</button>
      <button id="skillBtn" class="action">สกิล</button>
      <button id="rollBtn" class="action">กลิ้ง</button>
    </div>
  </div>

  <div id="errorBox"></div>
  <script src="game.js"></script>
</body>
</html>
